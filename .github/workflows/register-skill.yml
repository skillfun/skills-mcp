name: Register Bundle

on:
  issues:
    types:
      - labeled

permissions:
  contents: read

jobs:
  register-bundle:
    name: Register Bundle from Issue
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'register-bundle')

    steps:
      # 约定 Issue Body 为 JSON，且至少包含：
      # {
      #   "bundleName": "weather",
      #   "displayName": "Weather Bundle",
      #   "description": "Weather tools",
      #   "skills": [
      #     {
      #       "nftId": 1001,
      #       "name": "weather.current",
      #       "description": "Get current weather",
      #       "inputSchema": { "type": "object", "properties": { ... } }
      #     }
      #   ]
      # }
      - name: Extract bundle registration payload
        id: payload
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue?.body;

            if (!body || !body.trim()) {
              throw new Error('Issue 正文不能为空，且必须提供 bundle 注册 JSON。');
            }

            let payload;
            try {
              payload = JSON.parse(body);
            } catch (error) {
              throw new Error(`Issue 正文不是合法 JSON: ${error.message}`);
            }

            const requiredFields = ['bundleName', 'displayName', 'skills'];
            for (const field of requiredFields) {
              if (!(field in payload) || payload[field] === null || payload[field] === '') {
                throw new Error(`缺少必须字段: ${field}`);
              }
            }

            if (!Array.isArray(payload.skills) || payload.skills.length === 0) {
              throw new Error('skills 必须是非空数组');
            }

            for (const [index, skill] of payload.skills.entries()) {
              if (!skill || typeof skill !== 'object') {
                throw new Error(`skills[${index}] 必须是对象`);
              }

              for (const field of ['nftId', 'name', 'description', 'inputSchema']) {
                if (!(field in skill) || skill[field] === null || skill[field] === '') {
                  throw new Error(`skills[${index}] 缺少必须字段: ${field}`);
                }
              }
            }

            core.setOutput('bundle_payload_json', JSON.stringify(payload));

      - name: Register bundle through management API
        env:
          BUNDLE_ADMIN_API_URL: ${{ secrets.BUNDLE_ADMIN_API_URL }}
          BUNDLE_ADMIN_TOKEN: ${{ secrets.BUNDLE_ADMIN_TOKEN }}
          BUNDLE_PAYLOAD_JSON: ${{ steps.payload.outputs.bundle_payload_json }}
        run: |
          test -n "$BUNDLE_ADMIN_API_URL"
          test -n "$BUNDLE_ADMIN_TOKEN"
          test -n "$BUNDLE_PAYLOAD_JSON"

          http_code="$(
            curl --silent --show-error \
              --output /tmp/register-bundle-response.json \
              --write-out "%{http_code}" \
              --request POST \
              --url "$BUNDLE_ADMIN_API_URL/v1/mcp/bundles" \
              --header "Authorization: Bearer $BUNDLE_ADMIN_TOKEN" \
              --header "Content-Type: application/json" \
              --data "$BUNDLE_PAYLOAD_JSON"
          )"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            cat /tmp/register-bundle-response.json
            echo "Bundle registration failed with status $http_code" >&2
            exit 1
          fi

          cat /tmp/register-bundle-response.json
